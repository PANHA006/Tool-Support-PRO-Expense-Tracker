<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tool Support PRO | Expense Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Kantumruy+Pro:wght@300;400;600;700&display=swap');
        
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --danger: #f43f5e;
            --bg-glass: rgba(255, 255, 255, 0.8);
        }

        * {
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Plus Jakarta Sans', 'Kantumruy Pro', sans-serif;
            background-color: #fcfcfd;
            color: #1e293b;
            font-size: 14px;
            overscroll-behavior-y: contain;
        }

        /* Mobile-only styles */
        .mobile-form-modal {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            z-index: 50;
            border-radius: 20px 20px 0 0;
            transform: translateY(100%);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 -10px 25px -5px rgba(0, 0, 0, 0.1);
            max-height: 90vh;
            overflow-y: auto;
        }
        .mobile-form-modal.active {
            transform: translateY(0);
        }
        .overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(4px);
            z-index: 40;
        }
        .overlay.active {
            display: block;
        }

        /* Prevent pull-to-refresh on mobile */
        body {
            touch-action: pan-x pan-y;
        }
    </style>
</head>
<body class="min-h-screen pb-20">

    <!-- Header -->
    <header class="bg-white/70 backdrop-blur-md border-b border-slate-100 sticky top-0 z-30">
        <div class="p-4 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <img src="logo/logo.png" alt="Tool Support PRO Logo" class="w-[50px] h-[50px] rounded-2xl object-contain">
                <div>
                    <h1 class="text-[16px] font-bold tracking-tight leading-tight">Tool Support PRO</h1>
                    <p class="mt-1 text-[8px] text-slate-400 uppercase font-bold tracking-widest leading-none text-nowrap">Expense Tracker</p>
                </div>
            </div>
            
            <div class="text-right">
                <p class="text-[9px] text-slate-400 font-medium" id="current-day">Loading...</p>
                <p class="text-[11px] font-semibold text-slate-700" id="current-date">Loading...</p>
            </div>
        </div>
    </header>

    <main class="px-4 pt-4">
        
        <!-- Summary Cards -->
        <div class="grid grid-cols-2 gap-3 mb-4">
            <div class="col-span-2 bg-indigo-500 p-4 rounded-2xl shadow-lg shadow-indigo-100 text-white relative overflow-hidden">
                <div class="relative z-10">
                    <p class="text-indigo-100 text-[10px] font-semibold uppercase tracking-wider mb-0.5">Total Expend</p>
                    <h2 id="summary-total" class="text-2xl font-bold mb-2"><b class="">-</b> 0 ៛</h2>
                    <div class="flex items-center gap-2 text-[10px]">
                        <span class="bg-white/20 px-2.5 py-1 rounded-full flex items-center gap-1.5">
                            <span id="badge-record-count">0 Records</span>
                        </span>
                    </div>
                </div>
                <i class="fas fa-money-bill-wave absolute -right-4 -bottom-4 text-white/10 text-7xl rotate-12"></i>
            </div>
        </div>

        <!-- History Section -->
        <section>
            <div class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden min-h-[400px]">
                <!-- Toolbar -->
                <div class="px-4 py-3 border-b border-slate-50 flex items-center justify-between">
                    <h3 class="text-xs font-bold flex items-center gap-2">
                        <span class="w-1.5 h-4 bg-blue-500 rounded-full"></span>
                        History
                    </h3>
                    <div class="flex items-center gap-2">
                        <input type="date" id="filter-date" onchange="renderExpenses()"
                            class="text-[10px] bg-slate-50 border-none rounded-lg px-2 py-1.5 outline-none focus:ring-2 focus:ring-indigo-500/20">
                        <button onclick="clearFilters()" class="p-1.5 text-slate-400 hover:text-indigo-600 transition-colors">
                            <i class="fas fa-rotate-right text-[10px]"></i>
                        </button>
                    </div>
                </div>

                <!-- List Area -->
                <div id="expense-list-container" class="divide-y divide-slate-50">
                    <!-- Items injected here -->
                </div>

                <!-- Empty State -->
                <div id="empty-state" class="hidden p-12 text-center">
                    <div class="w-14 h-14 bg-slate-50 rounded-full flex items-center justify-center mx-auto mb-3">
                        <i class="fas fa-receipt text-slate-200 text-xl"></i>
                    </div>
                    <h4 class="text-slate-800 font-bold text-sm">No Records Yet</h4>
                    <p class="text-slate-400 text-[11px] mt-1">Start by adding your first expenditure.</p>
                </div>
            </div>
        </section>
    </main>

    <!-- Floating Action Button for Mobile -->
    <button onclick="toggleMobileForm()" id="mobile-fab" class="fixed bottom-6 right-6 w-14 h-14 bg-indigo-600 rounded-full flex items-center justify-center text-white shadow-xl shadow-indigo-400 z-40 transition-transform active:scale-90">
        <i class="fas fa-plus text-xl"></i>
    </button>

    <!-- Mobile Form Modal -->
    <div class="overlay" id="overlay" onclick="toggleMobileForm()"></div>
    <div class="mobile-form-modal px-6 pt-6 pb-8" id="mobile-form-container">
        <div class="w-12 h-1.5 bg-slate-300 rounded-full mx-auto mb-6 cursor-pointer" onclick="toggleMobileForm()"></div>
        <div class="flex justify-between items-center mb-6">
            <h3 class="text-lg font-bold" id="mobile-form-title">Add New Expense</h3>
            <button onclick="toggleMobileForm()" class="w-8 h-8 rounded-full bg-slate-100 flex items-center justify-center text-slate-500 hover:bg-slate-200 transition-colors">
                <i class="fas fa-times text-sm"></i>
            </button>
        </div>
        <form id="expense-form" class="space-y-4">
            <input type="hidden" id="edit-index" value="-1">
            
            <div class="space-y-1.5">
                <label class="text-[11px] font-bold text-slate-500 uppercase tracking-wide ml-1">Title</label>
                <input type="text" id="title" required 
                    class="w-full px-4 py-3 rounded-xl bg-slate-50 border border-slate-200 focus:bg-white focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none transition-all text-base placeholder:text-slate-400"
                    placeholder="e.g., Food, Transport, Rent">
            </div>

            <div class="space-y-1.5">
                <label class="text-[11px] font-bold text-slate-500 uppercase tracking-wide ml-1">Amount (៛)</label>
                <input type="number" step="100" id="amount" required 
                    class="w-full px-4 py-3 rounded-xl bg-slate-50 border border-slate-200 focus:bg-white focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none transition-all text-xl font-bold text-rose-600"
                    placeholder="0">
            </div>

            <div class="space-y-1.5">
                <label class="text-[11px] font-bold text-slate-500 uppercase tracking-wide ml-1">Date</label>
                <input type="date" id="date" required 
                    class="w-full px-4 py-3 rounded-xl bg-slate-50 border border-slate-200 focus:bg-white focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none transition-all text-base">
            </div>

            <button type="submit" id="submit-btn"
                class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3.5 rounded-xl text-base transition-all shadow-lg shadow-indigo-200 active:scale-[0.98] mt-2">
                Save Expense
            </button>
        </form>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="fixed top-4 left-1/2 -translate-x-1/2 bg-slate-900/90 backdrop-blur-md text-white px-4 py-2 rounded-xl shadow-2xl transform -translate-y-24 transition-all duration-500 z-[60] flex items-center gap-2">
        <div class="w-4 h-4 bg-green-500 rounded-full flex items-center justify-center text-[8px]">
            <i class="fas fa-check"></i>
        </div>
        <span id="toast-message" class="text-[11px] font-medium">Saved!</span>
    </div>

    <script>
        // State
        let expenses = JSON.parse(localStorage.getItem('expenses')) || [];
        const form = document.getElementById('expense-form');
        const listContainer = document.getElementById('expense-list-container');
        const emptyState = document.getElementById('empty-state');
        const overlay = document.getElementById('overlay');
        const modal = document.getElementById('mobile-form-container');
        
        function initDate() {
            const now = new Date();
            const dayEl = document.getElementById('current-day');
            const dateEl = document.getElementById('current-date');
            const dateInput = document.getElementById('date');

            dayEl.innerText = now.toLocaleDateString('en-US', { weekday: 'long' });
            dateEl.innerText = now.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
            
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            dateInput.value = `${year}-${month}-${day}`;
        }

        initDate();

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            handleSave();
        });

        function handleSave() {
            const title = document.getElementById('title').value;
            const amount = parseFloat(document.getElementById('amount').value);
            const date = document.getElementById('date').value;
            const editIndex = parseInt(document.getElementById('edit-index').value);

            const expenseData = { title, amount, date, id: Date.now() };

            if (editIndex === -1) {
                expenses.push(expenseData);
                showToast('Expense added successfully!');
            } else {
                expenses[editIndex] = { ...expenses[editIndex], ...expenseData };
                showToast('Expense updated successfully!');
            }

            saveAndRender();
            resetForm();
            
            if(modal.classList.contains('active')) toggleMobileForm();
        }

        function saveAndRender() {
            expenses.sort((a, b) => new Date(b.date) - new Date(a.date));
            localStorage.setItem('expenses', JSON.stringify(expenses));
            renderExpenses();
        }

        function renderExpenses() {
            const filterDate = document.getElementById('filter-date').value;
            const filtered = expenses.filter(exp => !filterDate || exp.date === filterDate);

            const total = filtered.reduce((sum, exp) => sum + exp.amount, 0);
            
            // UI Updates for record counts
            const count = filtered.length;
            document.getElementById('badge-record-count').innerText = `${count} Record${count !== 1 ? 's' : ''}`;
            document.getElementById('summary-total').innerText = total > 0 ? `- ${total.toLocaleString('km-KH')} ៛` : `0 ៛`;

            listContainer.innerHTML = '';
            
            if (filtered.length === 0) {
                emptyState.classList.remove('hidden');
            } else {
                emptyState.classList.add('hidden');
                filtered.forEach((exp) => {
                    const actualIndex = expenses.findIndex(item => item.id === exp.id);
                    
                    const item = document.createElement('div');
                    item.className = 'px-4 py-4 flex items-center justify-between hover:bg-slate-50 transition-all active:bg-slate-50';
                    item.innerHTML = `
                        <div class="flex items-center gap-3">
                            <div class="w-11 h-11 rounded-xl bg-rose-50 flex items-center justify-center text-rose-500 flex-shrink-0">
                                <i class="fas fa-arrow-up-from-bracket text-xs"></i>
                            </div>
                            <div class="flex-1 min-w-0">
                                <h4 class="font-bold text-slate-800 text-sm leading-snug truncate">${exp.title}</h4>
                                <p class="text-[10px] text-slate-400 font-medium uppercase tracking-wide">${formatCustomDate(exp.date)}</p>
                            </div>
                        </div>
                        <div class="flex items-center gap-2">
                            <div class="text-right flex-shrink-0">
                                <p class="font-bold text-rose-600 text-sm">- ${exp.amount.toLocaleString('km-KH')} ៛</p>
                            </div>
                            <div class="flex gap-1.5">
                                <button onclick="editExpense(${actualIndex})" class="w-8 h-8 rounded-lg bg-indigo-50 text-indigo-600 flex items-center justify-center hover:bg-indigo-100 transition-colors active:scale-95">
                                    <i class="fas fa-pencil-alt text-xs"></i>
                                </button>
                                <button onclick="deleteExpense(${actualIndex})" class="w-8 h-8 rounded-lg bg-rose-50 text-rose-600 flex items-center justify-center hover:bg-rose-100 transition-colors active:scale-95">
                                    <i class="fas fa-trash-alt text-xs"></i>
                                </button>
                            </div>
                        </div>
                    `;
                    listContainer.appendChild(item);
                });
            }
        }

        function editExpense(index) {
            const exp = expenses[index];
            document.getElementById('title').value = exp.title;
            document.getElementById('amount').value = exp.amount;
            document.getElementById('date').value = exp.date;
            document.getElementById('edit-index').value = index;
            
            document.getElementById('submit-btn').innerText = 'Update Expense';
            document.getElementById('mobile-form-title').innerText = 'Edit Expense';
            
            if(!modal.classList.contains('active')) {
                toggleMobileForm();
            }
        }

        function deleteExpense(index) {
            if(confirm('Delete this expense record?')) {
                expenses.splice(index, 1);
                saveAndRender();
                showToast('Expense deleted successfully!');
            }
        }

        function resetForm() {
            form.reset();
            document.getElementById('edit-index').value = "-1";
            initDate();
            document.getElementById('submit-btn').innerText = 'Save Expense';
            document.getElementById('mobile-form-title').innerText = 'Add New Expense';
        }

        function toggleMobileForm() {
            if(!modal.classList.contains('active')) {
                modal.classList.add('active');
                overlay.classList.add('active');
                document.body.style.overflow = 'hidden';
            } else {
                modal.classList.remove('active');
                overlay.classList.remove('active');
                document.body.style.overflow = '';
            }
        }

        function clearFilters() {
            document.getElementById('filter-date').value = '';
            renderExpenses();
        }

        /**
         * Formats YYYY-MM-DD to DD/MM/YYYY
         */
        function formatCustomDate(dateStr) {
            if (!dateStr) return '';
            const d = new Date(dateStr);
            const day = String(d.getDate()).padStart(2, '0');
            const month = String(d.getMonth() + 1).padStart(2, '0');
            const year = d.getFullYear();
            return `${day}/${month}/${year}`;
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            document.getElementById('toast-message').innerText = msg;
            toast.classList.remove('-translate-y-24');
            setTimeout(() => toast.classList.add('-translate-y-24'), 2500);
        }

        renderExpenses();
    </script>
</body>
</html>
